services:
  pi-web:
    # 用 CI 推好的镜像直接拉（默认）；想本地构建就改用下面的 build
    image: ghcr.io/majie1993/pi-web-docker:latest
    # build: .
    container_name: pi-web
    ports:
      # 绑定所有网卡：局域网设备 / 其他容器可经 NAS 局域网 IP 访问
      # ⚠️ pi 能执行任意命令，切勿在路由器上把此端口转发到公网
      # 想只允许本机访问，改成： "127.0.0.1:30141:30141"
      - "30141:30141"
    volumes:
      # pi 自己的会话记录、models.json、API key
      - ./data:/data
      # 挂载你想让 pi 访问的目录，例如：
      # - /path/to/files:/workspace
    restart: unless-stopped

    # 可选：以你的用户身份运行，避免 pi 写出的文件属主变成 root
    # 用 `id` 查出 uid:gid 后填入（bind 挂载的 ./data 目录需预先建好并归该用户所有）
    # user: "1000:1000"
